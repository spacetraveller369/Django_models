{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Новостной Портал{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { display: flex; min-height: 100vh; flex-direction: column; }
        main { flex: 1 0 auto; }
    </style>
</head>
<body>

    <header>
        <nav class="blue darken-3">
            <div class="nav-wrapper container">
                <a href="/news/" class="brand-logo"><i class="material-icons">newspaper</i>NewsPortal</a>
                <ul id="nav-mobile" class="right hide-on-med-and-down">
                    <li><a href="/news/">Главная</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container" style="margin-top: 30px;">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="page-footer blue darken-4">
        <div class="footer-copyright">
            <div class="container center-align">
                <a class="white-text" href="/news/" style="font-weight: bold; font-size: 1.2rem;">
                    © 2026 Новостной Портал "NewsPortal"
                </a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
